services:
  flow:
    image: ghcr.io/wkf2000/flow:latest
    container_name: flow
    restart: unless-stopped
    ports:
      - "${PORT:-8510}:8000"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
      - FLOW_DATA_DIR=/data
    volumes:
      - flow-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  flow-data:
